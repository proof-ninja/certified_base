name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "4.14"
          dune-cache: true

      # Cache the whole opam root (Rocq/OCaml deps take a long time to build
      # from source). Keyed on the exact dependency set (certified_base.opam,
      # generated by dune), with an OS+compiler prefix fallback. Only ever
      # written after a successful install, so a failed run can't poison the
      # cache with a half-installed switch.
      - name: Restore opam cache
        id: opam-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.opam
          key: opam-${{ runner.os }}-4.14-${{ hashFiles('certified_base.opam') }}
          restore-keys: |
            opam-${{ runner.os }}-4.14-

      - run: opam install . --deps-only --with-test
        shell: bash

      - name: Save opam cache
        if: steps.opam-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.opam
          key: opam-${{ runner.os }}-4.14-${{ hashFiles('certified_base.opam') }}

      - name: Build (dune build)
        run: opam exec -- dune build
        shell: bash

      - name: Test (dune test)
        run: opam exec -- dune test
        shell: bash
